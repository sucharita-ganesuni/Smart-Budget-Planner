<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Result ({{ method }})</h1>

    <table class="table">
        <tr>
            <th>Expense Name</th>
            <th>Amount</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item[0] }}</td>
            <td>{{ item[1] }}</td>
        </tr>
        {% endfor %}
    </table>

    <h2>Total: {{ total }}</h2>

    <a href="/">Go Back</a>
</div>

</body>
</html>
